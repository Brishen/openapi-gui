name: Publish

# Build the package and publish it to the GitHub Packages npm registry.
# Triggered when a GitHub Release is published; the release tag (e.g. v1.2.3)
# drives the published version. Can also be run manually.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 1.2.3), defaults to package.json
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@brishen'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set version from release tag
        if: github.event_name == 'release'
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Set version from manual input
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
